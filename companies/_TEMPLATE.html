<!DOCTYPE html>
<!-- ============================================================
     【新增公司頁範本】使用方式：
     1. 複製這個檔，改檔名為節點 id，例如 amd.html
     2. 把下面所有 {{...}} 換成你的內容
     3. 回 ../assets/data.js 的 companies 陣列，把該節點 status 改成 "done"
     4. 串聯：在「關聯節點」區塊，每連一個節點加一行 link-chip
        link-chip 格式： <a class="link-chip" href="../資料夾/節點id.html"><span class="dot 類型"></span>名稱</a>
        資料夾 = cycles / companies / parts；類型 = cycle / company / part
     ============================================================ -->
<html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{名稱}} · 科技供應鏈知識庫</title>
<link rel="stylesheet" href="../assets/style.css"></head><body>
<header class="site"><div class="wrap">
<a class="brand" href="../index.html">供應鏈<span class="mk">·</span>知識庫</a>
<span class="crumb"><a href="../index.html">首頁</a> / <a href="../index.html#companies">公司</a> / {{名稱}}</span>
<nav class="top"><a href="../index.html#cycles">週期</a><a href="../index.html#companies">公司</a><a href="../index.html#parts">零件</a><a href="../reference/glossary.html">術語表</a></nav>
</div></header>
<div class="wrap"><div class="layout">
<aside class="toc"><div class="tl">本頁目錄</div>
<a href="#profile">基本定位</a><a href="#role">角色</a><a href="#timeline">更新時間軸</a></aside>
<article>
<span class="tag-type company">公司</span>
<h1>{{名稱}}</h1>
<p class="lede">{{一句話定位}}</p>
<h2 id="profile">基本定位</h2>
<table class="deftable">
<tr><td>供應鏈位置</td><td>{{上游/中游/下游}}</td></tr>
<tr><td>做什麼</td><td>{{主要業務}}</td></tr>
<tr><td>代號</td><td>{{股票代號}}</td></tr>
</table>
<h2 id="role">角色</h2>
<p>{{在相關週期裡扮演什麼角色，可在這裡用 <a href="../parts/某零件.html">內文連結</a> 串到其他節點}}</p>
<div class="links-box"><div class="lt">關聯節點 · Connections</div>
<div class="chip-row">
<!-- 每連一個節點加一行，例如： -->
<a class="link-chip" href="../cycles/ai-server.html"><span class="dot cycle"></span>AI 伺服器</a>
<a class="link-chip" href="../parts/hbm.html"><span class="dot part"></span>HBM 高頻寬記憶體</a>
</div></div>
<h2 id="timeline">更新時間軸</h2>
<div class="timeline">
<div class="ev"><div class="dt">{{日期}}</div>建立此頁</div>
</div>
</article></div></div>
<footer class="site"><div class="wrap">科技供應鏈知識庫 · 個人研究用</div></footer>
</body></html>
